name: Release

# When a version-bump PR is merged into main (see Scripts/bump-version.sh),
# the version in Resources/Info.plist changes. This workflow reads that version,
# and if a matching tag does not yet exist, it tags, builds the .app, and
# publishes a GitHub Release. On ordinary pushes (version unchanged) it exits
# early. Tagging and releasing happen in the same job, so GITHUB_TOKEN is enough
# (no PAT needed) except for the cross-repo Homebrew tap update.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and Release macOS App
    # macos-26 ships Xcode 26 (actool >= 26), required to compile the
    # AppIcon.icon (Icon Composer) into Assets.car.
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Show Swift version
        run: swift --version

      - name: Read version and check tag
        id: version
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' Resources/Info.plist)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists; nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Releasing v$VERSION."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.version.outputs.release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Build App Bundle
        if: steps.version.outputs.release == 'true'
        run: make build

      - name: Verify build
        if: steps.version.outputs.release == 'true'
        run: |
          if [ ! -d ".build/release/Marklip Launcher.app" ]; then
            echo "Error: App Bundle not found!"
            exit 1
          fi

          if [ ! -f ".build/release/Marklip Launcher.app/Contents/MacOS/marklip-launcher" ]; then
            echo "Error: Executable not found!"
            exit 1
          fi

          if [ ! -f ".build/release/Marklip Launcher.app/Contents/Info.plist" ]; then
            echo "Error: Info.plist not found!"
            exit 1
          fi

          if [ ! -f ".build/release/Marklip Launcher.app/Contents/Resources/Assets.car" ]; then
            echo "Error: Assets.car (app icon) not found!"
            exit 1
          fi

          echo "Build verification passed"

      - name: Create distributable archive
        if: steps.version.outputs.release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd .build/release
          zip -r "Marklip-Launcher-${VERSION}.zip" "Marklip Launcher.app"
          cd ../..
          mv ".build/release/Marklip-Launcher-${VERSION}.zip" .

      - name: Create GitHub Release
        if: steps.version.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" "Marklip-Launcher-${VERSION}.zip" \
            --title "Marklip Launcher v$VERSION" \
            --generate-notes

      - name: Update Homebrew tap
        if: steps.version.outputs.release == 'true'
        uses: dayflower/brew-up@3f2a9919dd8b749fef56f762e911d42df31435d4 # v0.1.5
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          release-tag: v${{ steps.version.outputs.version }}
          template-path: .github/homebrew/marklip-launcher.rb.mustache
          output-path: Casks/marklip-launcher.rb
          asset-map: |
            default=Marklip-Launcher-{{version}}.zip
          target-repo: dayflower/homebrew-tap
          target-branch: main
          target-repo-token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          publish-mode: pr-auto-merge
          auto-merge-method: squash
