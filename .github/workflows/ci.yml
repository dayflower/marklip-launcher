name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: swift-format lint
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Show swift-format version
        run: xcrun swift-format --version

      - name: Run swift-format lint
        run: make check
